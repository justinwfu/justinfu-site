<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e0d0c">
  <title>Justin Fu — Coffee</title>
  <meta name="description" content="A specialty coffee photo journal by Justin Fu.">
  <link rel="canonical" href="https://justinfu.com/coffee.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Justin Fu — Coffee">
  <meta property="og:description" content="A specialty coffee photo journal by Justin Fu.">
  <meta property="og:url" content="https://justinfu.com/coffee.html">
  <meta property="og:image" content="https://justinfu.com/images/cover-coffee-vol-1.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Justin Fu — Coffee">
  <meta name="twitter:description" content="A specialty coffee photo journal by Justin Fu.">
  <meta name="twitter:image" content="https://justinfu.com/images/cover-coffee-vol-1.jpg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <header>
    <a class="back" href="index.html">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 01</div>
    <div class="ep-title">Coffee</div>
    <div class="ep-count">19 photographs</div>
  </header>

  <div class="gallery-wrap">
    <div class="masonry" id="gallery"></div>
  </div>

  <div id="lightbox">
    <span class="lb-close" onclick="closeLB()">close ✕</span>
    <span class="lb-nav" id="lb-prev" onclick="navLB(-1)">← prev</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav" id="lb-next" onclick="navLB(1)">next →</span>
    <div class="lb-counter" id="lb-counter"></div>
    <div id="lb-map-btn" onclick="openMap()">📍 view on map</div>
  </div>

  <div id="map-overlay">
    <span class="map-close" onclick="closeMap()">close ✕</span>
    <div id="map-container"></div>
    <div class="map-label" id="map-label"></div>
  </div>

  <footer>
    <span><a href="index.html" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>made with coffee</span>
  </footer>

  <script>
    var photos = ["images/coffee-vol-1/glitch-trio.jpg", "images/coffee-vol-1/geisha-pour.jpg", "images/coffee-vol-1/bw-coffee-sign.jpg", "images/coffee-vol-1/latte-tray.jpg", "images/coffee-vol-1/coffee-omakase.jpg", "images/coffee-vol-1/bw-blackcup.jpg", "images/coffee-vol-1/simple-kaffa-duo.jpg", "images/coffee-vol-1/lost-origin.jpg", "images/coffee-vol-1/bw-slowbar.jpg", "images/coffee-vol-1/compass-latte.jpg", "images/coffee-vol-1/croissant-cafe.jpg", "images/coffee-vol-1/koffee-mameya.jpg", "images/coffee-vol-1/bw-hand-cup.jpg", "images/coffee-vol-1/mame-latte.jpg", "images/coffee-vol-1/simple-kaffa-geisha.jpg", "images/coffee-vol-1/coffee-beach.jpg", "images/coffee-vol-1/compass-street.jpg", "images/coffee-vol-1/pourover-scale.jpg", "images/coffee-vol-1/bw-playing-coffee.jpg"];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(src, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = src; img.alt = 'Photograph ' + (i+1); img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i];
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden'; updateMapBtn();
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current];
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
      updateMapBtn();
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') { closeLB(); closeMap(); }
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });

    var GPS = {
      "images/coffee-vol-1/latte-tray.jpg": {
            "lat": 37.798467,
            "lng": -122.422225
      },
      "images/coffee-vol-1/geisha-pour.jpg": {
            "lat": 22.998583,
            "lng": 120.203683
      },
      "images/coffee-vol-1/simple-kaffa-duo.jpg": {
            "lat": 25.043861,
            "lng": 121.527786
      },
      "images/coffee-vol-1/compass-street.jpg": {
            "lat": 34.667069,
            "lng": 135.508042
      },
      "images/coffee-vol-1/simple-kaffa-geisha.jpg": {
            "lat": 25.043756,
            "lng": 121.527717
      },
      "images/coffee-vol-1/koffee-mameya.jpg": {
            "lat": 35.6684,
            "lng": 139.710953
      },
      "images/coffee-vol-1/mame-latte.jpg": {
            "lat": 35.662636,
            "lng": 139.744431
      },
      "images/coffee-vol-1/compass-latte.jpg": {
            "lat": 35.702828,
            "lng": 139.797836
      },
      "images/coffee-vol-1/coffee-omakase.jpg": {
            "lat": 35.668961,
            "lng": 139.709
      },
      "images/coffee-vol-1/glitch-trio.jpg": {
            "lat": 35.685356,
            "lng": 139.776108
      },
      "images/coffee-vol-1/lost-origin.jpg": {
            "lat": 35.702778,
            "lng": 139.797822
      }
};

    function updateMapBtn() {
      var src = photos[current];
      var btn = document.getElementById('lb-map-btn');
      btn.classList.add('visible');
      if (GPS[src]) {
        btn.classList.remove('no-gps');
        btn.textContent = '📍 view on map';
      } else {
        btn.classList.add('no-gps');
        btn.textContent = '📍 no location data';
      }
    }

    function openMap() {
      var src = photos[current];
      var g = GPS[src];
      var overlay = document.getElementById('map-overlay');
      var container = document.getElementById('map-container');
      var label = document.getElementById('map-label');
      if (!g) return;
      var url = 'https://maps.google.com/maps?q=' + g.lat + ',' + g.lng +
                '&z=15&output=embed&t=k';
      container.innerHTML = '<iframe src="' + url + '" allowfullscreen></iframe>';
      label.textContent = g.lat.toFixed(4) + ', ' + g.lng.toFixed(4);
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMap() {
      var overlay = document.getElementById('map-overlay');
      overlay.classList.remove('open');
      document.getElementById('map-container').innerHTML = '';
    }

    document.getElementById('map-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeMap();
    });
  </script>
</body>
</html>
