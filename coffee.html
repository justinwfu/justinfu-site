    "creator": { "@type": "Person", "name": "Justin Fu", "url": "https://justinfu.com/" },
    "image": [

      "https://justinfu.com/images/coffee/bw-coffee-sign.jpg",

      "https://justinfu.com/images/coffee/coffee-omakase.jpg",
      "https://justinfu.com/images/coffee/bw-blackcup.jpg",

      "https://justinfu.com/images/coffee/lost-origin.jpg",
      "https://justinfu.com/images/coffee/bw-slowbar.jpg",

      "https://justinfu.com/images/coffee/croissant-cafe.jpg",

    ]
  }
  </script>
</head>
<body>
  <header>
    <a class="back" href="/">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 01</div>
    <h1 class="ep-title">Coffee</h1>
    <div class="ep-count">19 photographs</div>
  </header>

  <main>
    <article class="gallery-wrap">
      <div class="masonry" id="gallery"></div>
    </article>
  </main>

  <div id="lightbox">
    <span class="lb-close" onclick="closeLB()">close ✕</span>
    <span class="lb-nav" id="lb-prev" onclick="navLB(-1)">← prev</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav" id="lb-next" onclick="navLB(1)">next →</span>
    <div class="lb-counter" id="lb-counter"></div>
    <div id="lb-map-btn" onclick="openMap()">📍 view on map</div>
  </div>

  <div id="map-overlay">
    <span class="map-close" onclick="closeMap()">close ✕</span>
    <div id="map-container"></div>
    <div class="map-label" id="map-label"></div>
  </div>

  <nav class="ep-nav">
    <span class="spacer"></span>
    <a href="/ricoh">Episode 02: Ricoh GR IV →</a>
  </nav>

  <footer>
    <span><a href="/" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>made with coffee</span>
  </footer>

  <script>
    var photos = [
      { src: "images/coffee/glitch-trio.jpg", alt: "Three glitched coffee portraits", w: 1600, h: 1200 },
      { src: "images/coffee/geisha-pour.jpg", alt: "Pouring a geisha coffee at Simple Kaffa, Tainan", w: 1200, h: 1600 },
      { src: "images/coffee/bw-coffee-sign.jpg", alt: "Coffee shop sign in black and white", w: 1600, h: 1067 },
      { src: "images/coffee/latte-tray.jpg", alt: "Latte and pastries on a tray, San Francisco", w: 1600, h: 1200 },
      { src: "images/coffee/coffee-omakase.jpg", alt: "Coffee omakase tasting flight, Tokyo", w: 1600, h: 1200 },
      { src: "images/coffee/bw-blackcup.jpg", alt: "Black coffee cup on a counter, black and white", w: 1600, h: 1067 },
      { src: "images/coffee/simple-kaffa-duo.jpg", alt: "Two coffees at Simple Kaffa, Taipei", w: 1200, h: 1600 },
      { src: "images/coffee/lost-origin.jpg", alt: "Lost Origin cafe interior, Tokyo", w: 1600, h: 1200 },
      { src: "images/coffee/bw-slowbar.jpg", alt: "Slow bar pour-over setup, black and white", w: 1600, h: 1067 },
      { src: "images/coffee/compass-latte.jpg", alt: "Latte at Compass Coffee, Tokyo", w: 1200, h: 1600 },
      { src: "images/coffee/croissant-cafe.jpg", alt: "Croissant on a saucer at a cafe", w: 1198, h: 1600 },
      { src: "images/coffee/koffee-mameya.jpg", alt: "Espresso pour at Koffee Mameya, Tokyo", w: 1200, h: 1600 },
      { src: "images/coffee/bw-hand-cup.jpg", alt: "Hand around a coffee cup, black and white", w: 1600, h: 1067 },
      { src: "images/coffee/mame-latte.jpg", alt: "Latte at Mame Coffee, Tokyo", w: 1600, h: 1563 },
      { src: "images/coffee/simple-kaffa-geisha.jpg", alt: "Geisha coffee glass at Simple Kaffa, Taipei", w: 1200, h: 1600 },
      { src: "images/coffee/coffee-beach.jpg", alt: "Coffee at the beach", w: 1200, h: 1600 },
      { src: "images/coffee/compass-street.jpg", alt: "Compass Coffee shopfront, Osaka", w: 1200, h: 1600 },
      { src: "images/coffee/pourover-scale.jpg", alt: "Pour-over coffee on a scale", w: 1200, h: 1600 },
      { src: "images/coffee/bw-playing-coffee.jpg", alt: "Playing with coffee, black and white", w: 1600, h: 1136 }
    ];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(p, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = p.src; img.alt = p.alt; img.width = p.w; img.height = p.h; img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i].src; lbImg.alt = photos[i].alt;
      if (photos[i+1]) new Image().src = photos[i+1].src;
      if (photos[i-1]) new Image().src = photos[i-1].src;
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden'; updateMapBtn();
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current].src; lbImg.alt = photos[current].alt;
      if (photos[current+1]) new Image().src = photos[current+1].src;
      if (photos[current-1]) new Image().src = photos[current-1].src;
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
      updateMapBtn();
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') { closeLB(); closeMap(); }
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });

    var GPS = {
      "images/coffee/latte-tray.jpg": {
            "lat": 37.798467,
            "lng": -122.422225
      },
      "images/coffee/geisha-pour.jpg": {
            "lat": 22.998583,
            "lng": 120.203683
      },
      "images/coffee/simple-kaffa-duo.jpg": {
            "lat": 25.043861,
            "lng": 121.527786
      },
      "images/coffee/compass-street.jpg": {
            "lat": 34.667069,
            "lng": 135.508042
      },
      "images/coffee/simple-kaffa-geisha.jpg": {
            "lat": 25.043756,
            "lng": 121.527717
      },
      "images/coffee/koffee-mameya.jpg": {
            "lat": 35.6684,
            "lng": 139.710953
      },
      "images/coffee/mame-latte.jpg": {
            "lat": 35.662636,
            "lng": 139.744431
      },
      "images/coffee/compass-latte.jpg": {
            "lat": 35.702828,
            "lng": 139.797836
      },
      "images/coffee/coffee-omakase.jpg": {
            "lat": 35.668961,
            "lng": 139.709
      },
      "images/coffee/glitch-trio.jpg": {
            "lat": 35.685356,
            "lng": 139.776108
      },
      "images/coffee/lost-origin.jpg": {
            "lat": 35.702778,
            "lng": 139.797822
      }
};

    function updateMapBtn() {
      var src = photos[current].src;
      var btn = document.getElementById('lb-map-btn');
      btn.classList.add('visible');
      if (GPS[src]) {
        btn.classList.remove('no-gps');
        btn.textContent = '📍 view on map';
      } else {
        btn.classList.add('no-gps');
        btn.textContent = '📍 no location data';
      }
    }

    function openMap() {
      var src = photos[current].src;
      var g = GPS[src];
      var overlay = document.getElementById('map-overlay');
      var container = document.getElementById('map-container');
      var label = document.getElementById('map-label');
      if (!g) return;
      var url = 'https://maps.google.com/maps?q=' + g.lat + ',' + g.lng +
                '&z=15&output=embed&t=k';
      container.innerHTML = '<iframe src="' + url + '" allowfullscreen></iframe>';
      label.textContent = g.lat.toFixed(4) + ', ' + g.lng.toFixed(4);
      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeMap() {
      var overlay = document.getElementById('map-overlay');
      overlay.classList.remove('open');
      document.getElementById('map-container').innerHTML = '';
    }

    document.getElementById('map-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeMap();
    });
  </script>
</body>
</html>
