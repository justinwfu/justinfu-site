<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e0d0c">
  <title>Justin Fu — Ricoh GR IV</title>
  <meta name="description" content="Street and travel photography shot on Ricoh GR IV by Justin Fu.">
  <link rel="canonical" href="https://justinfu.com/ricoh.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Justin Fu — Ricoh GR IV">
  <meta property="og:description" content="Street and travel photography shot on Ricoh GR IV by Justin Fu.">
  <meta property="og:url" content="https://justinfu.com/ricoh.html">
  <meta property="og:image" content="https://justinfu.com/images/cover-ricoh-vol-1.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Justin Fu — Ricoh GR IV">
  <meta name="twitter:description" content="Street and travel photography shot on Ricoh GR IV by Justin Fu.">
  <meta name="twitter:image" content="https://justinfu.com/images/cover-ricoh-vol-1.jpg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <header>
    <a class="back" href="index.html">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 02</div>
    <div class="ep-title">Ricoh GR IV</div>
    <div class="ep-count">16 photographs</div>
  </header>

  <div class="gallery-wrap">
    <div class="masonry" id="gallery"></div>
  </div>

  <div id="lightbox">
    <span class="lb-close" onclick="closeLB()">close ✕</span>
    <span class="lb-nav" id="lb-prev" onclick="navLB(-1)">← prev</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav" id="lb-next" onclick="navLB(1)">next →</span>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <footer>
    <span><a href="index.html" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>made with ricoh gr iv</span>
  </footer>

  <script>
    var photos = ["images/ricoh-vol-1/golden-gate.jpg", "images/ricoh-vol-1/lacma-stairs.jpg", "images/ricoh-vol-1/beach-boardwalk.jpg", "images/ricoh-vol-1/tree-canopy.jpg", "images/ricoh-vol-1/sf-coastal-path.jpg", "images/ricoh-vol-1/getty-rotunda.jpg", "images/ricoh-vol-1/griffith-monument.jpg", "images/ricoh-vol-1/la-bridge.jpg", "images/ricoh-vol-1/getty-garden.jpg", "images/ricoh-vol-1/getty-triangle.jpg", "images/ricoh-vol-1/beach-skater.jpg", "images/ricoh-vol-1/samsung-cameras.jpg", "images/ricoh-vol-1/getty-hummingbird.jpg", "images/ricoh-vol-1/getty-spiral.jpg", "images/ricoh-vol-1/coffee-hands.jpg", "images/ricoh-vol-1/car-wiper.jpg"];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(src, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = src; img.alt = 'Photograph ' + (i+1); img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i];
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current];
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });
  </script>
</body>
</html>
