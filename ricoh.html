<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Justin Fu — Ricoh GR IV</title>
  <meta name="description" content="Street and travel photography shot on Ricoh GR IV by Justin Fu.">
  <meta property="og:title" content="Justin Fu — Ricoh GR IV">
  <meta property="og:image" content="images/cover-ricoh-vol-1.jpg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0d0c; --bg2: #161412; --text: #d4cfc9;
      --muted: #5a554f; --accent: #c8a96e; --white: #f0ece6;
      --border: rgba(255,255,255,0.07); --col-gap: 10px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'Geist Mono', monospace; min-height: 100vh; }

    header {
      padding: 36px 40px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px;
    }
    .back {
      font-size: 11px; color: var(--muted); text-decoration: none;
      letter-spacing: 0.12em; text-transform: uppercase;
      transition: color 0.2s; white-space: nowrap;
    }
    .back:hover { color: var(--white); }
    .divider { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
    .ep-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--accent); }
    .ep-title {
      font-family: 'Cormorant Garamond', serif; font-size: 22px;
      font-weight: 300; color: var(--white); margin-left: auto;
    }
    .ep-count { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; white-space: nowrap; }

    .gallery-wrap { padding: 28px 40px 80px; }
    .masonry { columns: 3; column-gap: var(--col-gap); }
    @media (max-width: 900px) { .masonry { columns: 2; } }
    @media (max-width: 540px) {
      .masonry { columns: 1; }
      header { padding: 20px; flex-wrap: wrap; gap: 10px; }
      .ep-title { font-size: 18px; }
      .gallery-wrap { padding: 16px 16px 60px; }
    }

    .photo-item {
      break-inside: avoid; margin-bottom: var(--col-gap);
      overflow: hidden; cursor: pointer; background: var(--bg2);
    }
    .photo-item img {
      display: block; width: 100%; height: auto;
      transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.35s;
      opacity: 0;
    }
    .photo-item img.loaded { opacity: 1; }
    .photo-item:hover img { transform: scale(1.03); }

    /* Lightbox */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(10,9,8,0.97); z-index: 1000;
      align-items: center; justify-content: center; cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: min(90vw,1200px); max-height: 90vh;
      object-fit: contain; display: block;
      animation: lbIn 0.22s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    @keyframes lbIn { from { opacity:0; transform:scale(0.96); } to { opacity:1; transform:scale(1); } }
    .lb-close {
      position: fixed; top: 22px; right: 26px;
      font-size: 11px; letter-spacing: 0.15em; color: var(--muted);
      cursor: pointer; text-transform: uppercase; transition: color 0.2s;
    }
    .lb-close:hover { color: var(--white); }
    .lb-nav {
      position: fixed; top: 0; bottom: 0; width: 80px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; letter-spacing: 0.1em; color: var(--muted);
      cursor: pointer; text-transform: uppercase; transition: color 0.2s, background 0.2s;
      user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .lb-nav:hover { color: var(--white); background: rgba(255,255,255,0.03); }
    #lb-prev { left: 0; } #lb-next { right: 0; }
    .lb-counter {
      position: fixed; bottom: 26px; left: 50%; transform: translateX(-50%);
      font-size: 11px; color: var(--muted); letter-spacing: 0.12em;
    }
    @media (max-width: 540px) {
      .lb-nav { width: 52px; font-size: 10px; }
      .lb-close { top: 16px; right: 16px; }
    }

    footer {
      border-top: 1px solid var(--border); padding: 22px 40px;
      display: flex; justify-content: space-between; align-items: center;
    }
    footer span { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; }
  </style>
</head>
<body>
  <header>
    <a class="back" href="index.html">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 02</div>
    <div class="ep-title">Ricoh GR IV</div>
    <div class="ep-count">20 photographs</div>
  </header>

  <div class="gallery-wrap">
    <div class="masonry" id="gallery"></div>
  </div>

  <div id="lightbox">
    <span class="lb-close" onclick="closeLB()">close ✕</span>
    <span class="lb-nav" id="lb-prev" onclick="navLB(-1)">← prev</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav" id="lb-next" onclick="navLB(1)">next →</span>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <footer>
    <span><a href="index.html" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>made with ricoh gr iv</span>
  </footer>

  <script>
    var photos = ["images/ricoh-vol-1/golden-gate.jpg", "images/ricoh-vol-1/lacma-stairs.jpg", "images/ricoh-vol-1/beach-boardwalk.jpg", "images/ricoh-vol-1/tree-canopy.jpg", "images/ricoh-vol-1/sf-coastal-path.jpg", "images/ricoh-vol-1/getty-rotunda.jpg", "images/ricoh-vol-1/griffith-monument.jpg", "images/ricoh-vol-1/lacma-plaza.jpg", "images/ricoh-vol-1/la-bridge.jpg", "images/ricoh-vol-1/beach-sunset.jpg", "images/ricoh-vol-1/getty-garden.jpg", "images/ricoh-vol-1/getty-triangle.jpg", "images/ricoh-vol-1/lacma-interior.jpg", "images/ricoh-vol-1/beach-skater.jpg", "images/ricoh-vol-1/samsung-cameras.jpg", "images/ricoh-vol-1/getty-hummingbird.jpg", "images/ricoh-vol-1/getty-spiral.jpg", "images/ricoh-vol-1/art-painting.jpg", "images/ricoh-vol-1/coffee-hands.jpg", "images/ricoh-vol-1/car-wiper.jpg"];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(src, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = src; img.alt = 'Photograph ' + (i+1); img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i];
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current];
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });
  </script>
</body>
</html>
