  <script>
    var photos = [
      { src: "images/ricoh/golden-gate.jpg", alt: "Golden Gate Bridge from a distance", w: 1600, h: 1067 },
      { src: "images/ricoh/lacma-stairs.jpg", alt: "LACMA museum stairs, Los Angeles", w: 1600, h: 1067 },
      { src: "images/ricoh/beach-boardwalk.jpg", alt: "Beach boardwalk, southern California", w: 1600, h: 1067 },
      { src: "images/ricoh/tree-canopy.jpg", alt: "Looking up into a tree canopy", w: 1067, h: 1600 },
      { src: "images/ricoh/sf-coastal-path.jpg", alt: "San Francisco coastal path", w: 1600, h: 1067 },
      { src: "images/ricoh/getty-rotunda.jpg", alt: "Getty Center rotunda interior", w: 1600, h: 1067 },
      { src: "images/ricoh/griffith-monument.jpg", alt: "Griffith Observatory monument", w: 1138, h: 1512 },
      { src: "images/ricoh/la-bridge.jpg", alt: "Los Angeles bridge at golden hour", w: 1522, h: 1147 },
      { src: "images/ricoh/getty-garden.jpg", alt: "Getty Center garden", w: 1587, h: 871 },
      { src: "images/ricoh/getty-triangle.jpg", alt: "Triangular composition at the Getty Center", w: 1600, h: 1067 },
      { src: "images/ricoh/beach-skater.jpg", alt: "Black-and-white skater on a beach boardwalk", w: 750, h: 390 },
      { src: "images/ricoh/samsung-cameras.jpg", alt: "Display of Samsung cameras", w: 1600, h: 1067 },
      { src: "images/ricoh/getty-hummingbird.jpg", alt: "Hummingbird at the Getty Center", w: 1600, h: 834 },
      { src: "images/ricoh/getty-spiral.jpg", alt: "Spiral staircase at the Getty Center", w: 1600, h: 1067 },
      { src: "images/ricoh/coffee-hands.jpg", alt: "Hands around a coffee cup", w: 890, h: 737 },
      { src: "images/ricoh/car-wiper.jpg", alt: "Windshield wiper on a parked car", w: 1600, h: 908 }
    ];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(p, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = p.src; img.alt = p.alt; img.width = p.w; img.height = p.h; img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i].src; lbImg.alt = photos[i].alt;
      if (photos[i+1]) new Image().src = photos[i+1].src;
      if (photos[i-1]) new Image().src = photos[i-1].src;
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current].src; lbImg.alt = photos[current].alt;
      if (photos[current+1]) new Image().src = photos[current+1].src;
      if (photos[current-1]) new Image().src = photos[current-1].src;
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });
  </script>
