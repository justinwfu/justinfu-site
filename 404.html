<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e0d0c">
  <title>Justin Fu — 404</title>
  <meta name="description" content="Page not found.">
  <meta name="author" content="Justin Fu">
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body.notfound { display: flex; min-height: 100vh; flex-direction: column; }
    .notfound-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 48px 24px; text-align: center; gap: 18px; }
    .notfound-code { font-family: 'Cormorant Garamond', serif; font-size: 96px; font-weight: 300; color: var(--white); letter-spacing: 0.04em; line-height: 1; }
    .notfound-msg { font-size: 12px; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; }
    .notfound-link { margin-top: 12px; font-size: 11px; color: var(--accent); text-decoration: none; letter-spacing: 0.16em; text-transform: uppercase; transition: color 0.2s; }
    .notfound-link:hover { color: var(--white); }
  </style>
</head>
<body class="notfound">
  <main class="notfound-wrap">
    <div class="notfound-code">404</div>
    <div class="notfound-msg">page not found</div>
    <a class="notfound-link" href="/">← all episodes</a>
  </main>
  <footer>
    <span><a href="/" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>404</span>
  </footer>
</body>
</html>
