  <link rel="stylesheet" href="gallery.css">
  <script defer src="/_vercel/insights/script.js"></script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "ImageGallery",
    "name": "Baseball",
    "description": "Black and white photographs from Dodger Stadium by Justin Fu.",
    "url": "https://justinfu.com/baseball",
    "datePublished": "2026-05-12",
    "creator": { "@type": "Person", "name": "Justin Fu", "url": "https://justinfu.com/" },
    "image": [
      "https://justinfu.com/images/baseball/dodger-stadium.jpg",
      "https://justinfu.com/images/baseball/empty-seats.jpg",
      "https://justinfu.com/images/baseball/stadium-steps.jpg"
    ]
  }
  </script>
</head>
<body>
  <header>
    <a class="back" href="/">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 05</div>
    <h1 class="ep-title">Baseball</h1>
    <div class="ep-count">3 photographs</div>
  </header>

  <main>
    <article class="gallery-wrap">
      <div class="masonry" id="gallery"></div>
    </article>
  </main>

  <div id="lightbox">
    <span class="lb-close" onclick="closeLB()">close ✕</span>
    <span class="lb-nav" id="lb-prev" onclick="navLB(-1)">← prev</span>
    <img id="lb-img" src="" alt="">
    <span class="lb-nav" id="lb-next" onclick="navLB(1)">next →</span>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <nav class="ep-nav">
    <a href="/screengram">← Episode 04: Screengram</a>
    <a href="/sontag">Episode 06: Sontag →</a>
  </nav>

  <footer>
    <span><a href="/" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>dodger stadium</span>
  </footer>

  <script>
    var photos = [
      { src: "images/baseball/dodger-stadium.jpg", alt: "Dodger Stadium concourse, black and white", w: 1600, h: 1066 },
      { src: "images/baseball/empty-seats.jpg", alt: "Empty Dodger Stadium seats, black and white", w: 1514, h: 1176 },
      { src: "images/baseball/stadium-steps.jpg", alt: "Concrete stadium steps, black and white", w: 1600, h: 954 }
    ];
    var current = 0;
    var gallery = document.getElementById('gallery');
    photos.forEach(function(p, i) {
      var item = document.createElement('div');
      item.className = 'photo-item';
      var img = document.createElement('img');
      img.src = p.src; img.alt = p.alt; img.width = p.w; img.height = p.h; img.loading = 'lazy';
      img.onload = function() { this.classList.add('loaded'); };
      item.appendChild(img);
      item.addEventListener('click', function() { openLB(i); });
      gallery.appendChild(item);
    });
    var lb = document.getElementById('lightbox');
    var lbImg = document.getElementById('lb-img');
    var lbCounter = document.getElementById('lb-counter');
    function openLB(i) {
      current = i; lbImg.src = photos[i].src; lbImg.alt = photos[i].alt;
      if (photos[i+1]) new Image().src = photos[i+1].src;
      if (photos[i-1]) new Image().src = photos[i-1].src;
      lbCounter.textContent = (i+1) + ' / ' + photos.length;
      lb.classList.add('open'); document.body.style.overflow = 'hidden';
    }
    function closeLB() { lb.classList.remove('open'); document.body.style.overflow = ''; }
    function navLB(dir) {
      current = (current + dir + photos.length) % photos.length;
      lbImg.src = photos[current].src; lbImg.alt = photos[current].alt;
      if (photos[current+1]) new Image().src = photos[current+1].src;
      if (photos[current-1]) new Image().src = photos[current-1].src;
      lbCounter.textContent = (current+1) + ' / ' + photos.length;
    }
    lb.addEventListener('click', function(e) { if (e.target === lb) closeLB(); });
    document.addEventListener('keydown', function(e) {
      if (!lb.classList.contains('open')) return;
      if (e.key === 'Escape') closeLB();
      if (e.key === 'ArrowLeft') navLB(-1);
      if (e.key === 'ArrowRight') navLB(1);
    });
  </script>
</body>
</html>
