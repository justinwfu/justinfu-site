<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0e0d0c">
  <title>Justin Fu — AI-generated EDM</title>
  <meta name="description" content="AI-generated EDM by Justin Fu, made with Suno.">
  <link rel="canonical" href="https://justinfu.com/suno.html">
  <meta property="og:type" content="article">
  <meta property="og:title" content="Justin Fu — AI-generated EDM">
  <meta property="og:description" content="AI-generated EDM by Justin Fu, made with Suno.">
  <meta property="og:url" content="https://justinfu.com/suno.html">
  <meta property="og:image" content="https://justinfu.com/images/cover-suno-vol-1.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Justin Fu — AI-generated EDM">
  <meta name="twitter:description" content="AI-generated EDM by Justin Fu, made with Suno.">
  <meta name="twitter:image" content="https://justinfu.com/images/cover-suno-vol-1.jpg">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◼</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <header>
    <a class="back" href="index.html">← all episodes</a>
    <div class="divider"></div>
    <div class="ep-label">Episode 03</div>
    <div class="ep-title">Buddhist EDM</div>
    <div class="ep-count" id="track-count"></div>
  </header>

  <div class="player-wrap" id="player-wrap">
    <div class="setlist" id="setlist">
      <div class="setlist-header">Tracklist</div>
    </div>
    <div class="stage">
      <div class="stage-label" id="stage-num"></div>
      <div class="stage-title" id="stage-title"></div>
      <div class="stage-embed" id="stage-embed"></div>
      <div class="stage-nav">
        <button class="nav-btn" id="prev-btn">← prev</button>
        <span class="stage-counter" id="stage-counter"></span>
        <button class="nav-btn" id="next-btn">next →</button>
      </div>
    </div>
  </div>

  <footer>
    <span><a href="index.html" style="color:inherit;text-decoration:none;">justinfu.com</a></span>
    <span>made with suno</span>
  </footer>

  <script>
    var tracks = [
      { id: "09b1bf02-ed12-4e3e-a5aa-f4e794798edf", title: "Vanilla Teal" },
      { id: "e7c2766b-6f8d-4219-8471-5d7ab500bab5", title: "Open Hands Tonight" },
      { id: "d5ad9c9d-d20d-466c-8482-f2cf9bcfdaf7", title: "Open Hands Yesterday" },
      { id: "a026258b-7d53-4d51-947d-aa41ac51f959", title: "Open Palm Drive" },
      { id: "e6b94108-6867-4e37-bc37-ed97f1a6251e", title: "Eightfold Path Progressive House" },
      { id: "51615056-e8b0-4f00-b31f-b679ee26249c", title: "Eightfold" },
    ];

    var currentIdx = 0;
    var stageNum = document.getElementById('stage-num');
    var stageTitle = document.getElementById('stage-title');
    var stageCounter = document.getElementById('stage-counter');
    var prevBtn = document.getElementById('prev-btn');
    var nextBtn = document.getElementById('next-btn');
    var setlistEl = document.getElementById('setlist');
    var stageEmbedEl = document.getElementById('stage-embed');
    var countEl = document.getElementById('track-count');

    countEl.textContent = tracks.length + ' track' + (tracks.length !== 1 ? 's' : '');

    // Loading indicator sits on top of whichever iframe is active
    var loader = document.createElement('div');
    loader.className = 'embed-loader hidden';
    loader.textContent = 'loading';
    stageEmbedEl.appendChild(loader);

    // Create one persistent iframe per track — no src yet
    var iframes = tracks.map(function() {
      var iframe = document.createElement('iframe');
      iframe.allow = 'autoplay';
      stageEmbedEl.insertBefore(iframe, loader);
      return { el: iframe, loaded: false, loading: false };
    });

    function stopTrack(idx) {
      var t = iframes[idx];
      t.el.src = 'about:blank';
      t.loaded = false;
      t.loading = false;
    }

    function loadTrack(idx) {
      var t = iframes[idx];
      if (t.loaded || t.loading) return;
      t.loading = true;
      t.el.src = 'https://suno.com/embed/' + tracks[idx].id;
      t.el.addEventListener('load', function() {
        t.loaded = true;
        t.loading = false;
        if (currentIdx === idx) loader.classList.add('hidden');
      }, { once: true });
    }

    // Build setlist
    tracks.forEach(function(track, i) {
      var item = document.createElement('div');
      item.className = 'setlist-item';
      var num = String(i + 1).padStart(2, '0');
      var numEl = document.createElement('div');
      numEl.className = 'setlist-num';
      numEl.textContent = num;
      var nameEl = document.createElement('div');
      nameEl.className = 'setlist-name';
      nameEl.textContent = track.title;
      item.appendChild(numEl);
      item.appendChild(nameEl);
      item.addEventListener('click', function() { goTo(i); });
      setlistEl.appendChild(item);
    });

    function goTo(idx) {
      if (idx !== currentIdx) stopTrack(currentIdx);
      currentIdx = idx;
      var total = tracks.length;
      var num = String(idx + 1).padStart(2, '0');

      stageNum.textContent = 'Track ' + num;
      stageTitle.textContent = tracks[idx].title;
      stageCounter.textContent = num + ' — ' + String(total).padStart(2, '0');

      prevBtn.disabled = idx === 0;
      nextBtn.disabled = idx === total - 1;

      // Show active iframe, hide others
      iframes.forEach(function(t, i) {
        t.el.classList.toggle('active', i === idx);
      });

      // Show loader only if this track hasn't finished loading yet
      if (!iframes[idx].loaded) {
        loader.classList.remove('hidden');
      } else {
        loader.classList.add('hidden');
      }

      loadTrack(idx);

      // Highlight setlist
      var items = setlistEl.querySelectorAll('.setlist-item');
      items.forEach(function(el, i) { el.classList.toggle('active', i === idx); });
      var activeItem = items[idx];
      if (activeItem) activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    prevBtn.addEventListener('click', function() { if (currentIdx > 0) goTo(currentIdx - 1); });
    nextBtn.addEventListener('click', function() { if (currentIdx < tracks.length - 1) goTo(currentIdx + 1); });

    goTo(0);
  </script>
</body>
</html>
